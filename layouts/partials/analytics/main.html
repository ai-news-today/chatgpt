{{- $ga4 := "" -}}
{{- with site.Params.analytics.ga4.id -}}
  {{- $ga4 = . -}}
{{- end -}}

{{- with $ga4 -}}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ . }}');
  </script>
{{- end -}}
